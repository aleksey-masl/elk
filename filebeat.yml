filebeat.inputs:
  - type: filestream
    id: system-logs
    paths:
      - /var/log/*.log
    fields:
      log_type: system
      data_stream.type: logs
      data_stream.dataset: system_log
      data_stream.namespace: default
    fields_under_root: true

filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true
      # Дефолтные поля для всех контейнеров без специфичных лейблов
      templates:
        - config:
            - type: container
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              fields:
                log_type: docker
                data_stream.type: logs
                data_stream.dataset: docker  # можно переопределить лейблом контейнера
                data_stream.namespace: default
              fields_under_root: true

processors:
  - add_docker_metadata: ~

setup.ilm.enabled: false
setup.template.enabled: false

setup.kibana:
  host: ${KIBANA_HOSTS}
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}

output.elasticsearch:
  hosts: ${ELASTIC_HOSTS}
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  ssl.enabled: true
  ssl.certificate_authorities: "certs/ca/ca.crt"

  indices:
    - index: "%{[data_stream.type]}-%{[data_stream.dataset]}-%{[data_stream.namespace]}"
      when:
        contains:
          log_type: "system"    # → logs-system_log-default

    - index: "%{[data_stream.type]}-%{[data_stream.dataset]}-%{[data_stream.namespace]}"
      when:
        contains:
          log_type: "docker"    # → logs-docker-default
